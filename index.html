<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SILBOT — 3D Programmable Matter Transport Simulator</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
  <div id="canvas-container"></div>

  <div id="ui-overlay">
    <h1>Programmable Matter Simulator</h1>
    <p>Click on the top of the cavity entrance to place a funnel. Once placed, start the auto-fill to watch the particles push each other and solidify into walls.</p>
    <hr class="divider">
    <p>Active Agents: <span id="agent-count" class="stat">0</span></p>
    <p>Solidified Walls: <span id="sim-step" class="stat">0</span></p>

    <div id="controls">
      <div class="btn-group">
        <button class="btn" id="btn-autofill" type="button" disabled>Start Auto-Fill</button>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/lattice.js"></script>
  <script src="js/scene.js"></script>
  <script src="js/structure.js"></script>
  <script src="js/agent.js"></script>
  <script src="js/simulator.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
